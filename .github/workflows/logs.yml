name: Show server logs

on:
  workflow_dispatch:
    inputs:
      lines:
        description: "How many log lines per container"
        required: false
        default: "200"

jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch logs via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: app
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: LINES
          script: |
            cd /home/app/onix

            echo "=== Deployed commit (repo checkout) ==="
            git log -1 --oneline

            echo
            echo "=== When each container's image was built (sanity check vs. commit time) ==="
            for color in blue green; do
              cid=$(docker compose ps -q "app_$color" 2>/dev/null)
              if [ -n "$cid" ]; then
                echo "app_$color: container created $(docker inspect --format='{{.Created}}' "$cid" 2>/dev/null)"
              else
                echo "app_$color: not running"
              fi
            done

            echo
            echo "=== Active color ==="
            cat .active_color 2>/dev/null || echo "(none set)"

            echo
            echo "=== docker compose ps ==="
            docker compose ps

            for color in blue green; do
              echo
              echo "=== app_$color: docker inspect health ==="
              docker inspect --format='{{json .State.Health}}' "onix_app_$color" 2>/dev/null | python3 -m json.tool 2>/dev/null \
                || docker inspect --format='{{json .State.Health}}' "onix_app_$color" 2>/dev/null \
                || echo "(container not found)"

              echo
              echo "=== app_$color: last $LINES log lines ==="
              docker compose logs --tail="$LINES" "app_$color" 2>&1 || echo "(no logs)"
            done
        env:
          LINES: ${{ github.event.inputs.lines }}
