name: Server Control

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Command'
        required: true
        default: 'status'
        type: choice
        options:
          - start
          - stop
          - restart
          - logs
          - status

jobs:
  control:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: app
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== docker ps ==="
            docker ps --filter "name=onix" --format "table {{.Names}}\t{{.Status}}"
            echo "=== docker compose ls ==="
            docker compose ls 2>/dev/null || echo "no docker compose ls"
            echo "=== project files ==="
            ls -la /home/app/onix/docker-compose.yml 2>/dev/null || ls -la /root/onix/docker-compose.yml 2>/dev/null || find /home -name docker-compose.yml -maxdepth 3 2>/dev/null || find /root -name docker-compose.yml -maxdepth 3 2>/dev/null || echo "no compose file found"

      - name: Executing ${{ inputs.command }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: app
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            PROJ_DIR=""
            for d in /home/app/onix /root/onix /app /home/app; do
              if [ -f "$d/docker-compose.yml" ]; then
                PROJ_DIR="$d"
                break
              fi
            done

            if [ -z "$PROJ_DIR" ]; then
              echo "❌ docker-compose.yml not found"
              exit 1
            fi

            cd "$PROJ_DIR"
            echo "📍 Project dir: $PROJ_DIR"

            ACTIVE=$(cat .active_color 2>/dev/null || echo "")
            if [ -z "$ACTIVE" ]; then
              echo "❌ No .active_color set — don't know which service (app_blue/app_green) is active"
              exit 1
            fi
            SERVICE="app_$ACTIVE"
            echo "📍 Active service: $SERVICE"

            case "${{ inputs.command }}" in
              start)
                docker compose up -d "$SERVICE"
                echo "✅ Service started"
                ;;
              stop)
                docker compose stop "$SERVICE"
                echo "⏹️ Service stopped"
                ;;
              restart)
                docker compose restart "$SERVICE"
                echo "🔄 Service restarted"
                ;;
              logs)
                docker compose logs --tail=50 "$SERVICE"
                ;;
              status)
                docker compose ps "$SERVICE"
                echo "---"
                docker compose logs --tail=5 "$SERVICE"
                ;;
            esac
