name: Deploy

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy"
        required: false
        default: "manual"
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: app
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: REPO_URL,TELEGRAM_BOT_TOKEN,ENCRYPTION_KEY,DB_PASSWORD,APP_URL,TELEGRAM_OAUTH_CLIENT_ID,TELEGRAM_OAUTH_CLIENT_SECRET,TELEGRAM_OAUTH_REDIRECT_URI
          script: |
            set -e
            if [ ! -d /home/app/onix ]; then
              git clone $REPO_URL /home/app/onix
            fi
            cd /home/app/onix
            git fetch origin main && git reset --hard origin/main

            cat > .env << EOF
            DB_PASSWORD=$DB_PASSWORD
            TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN
            TELEGRAM_BOT_USERNAME=OnixSolanaScanner_Bot
            ENCRYPTION_KEY=$ENCRYPTION_KEY
            APP_URL=$(echo "$APP_URL" | xargs)
            TELEGRAM_OAUTH_CLIENT_ID=$TELEGRAM_OAUTH_CLIENT_ID
            TELEGRAM_OAUTH_CLIENT_SECRET=$TELEGRAM_OAUTH_CLIENT_SECRET
            TELEGRAM_OAUTH_REDIRECT_URI=$TELEGRAM_OAUTH_REDIRECT_URI
            EOF

            docker compose up -d --build
            docker image prune -f

            echo "Waiting for app container to become healthy..."
            for i in $(seq 1 30); do
              status=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q app) 2>/dev/null || echo "starting")
              if [ "$status" = "healthy" ]; then
                echo "App is healthy."
                exit 0
              fi
              if [ "$status" = "unhealthy" ]; then
                echo "App reported unhealthy. Recent logs:"
                docker compose logs --tail=100 app
                exit 1
              fi
              sleep 5
            done
            echo "Timed out waiting for app to become healthy. Recent logs:"
            docker compose logs --tail=100 app
            exit 1
        env:
          REPO_URL: https://github.com/${{ github.repository }}.git
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          APP_URL: ${{ secrets.APP_URL }}
          TELEGRAM_OAUTH_CLIENT_ID: ${{ secrets.TELEGRAM_OAUTH_CLIENT_ID }}
          TELEGRAM_OAUTH_CLIENT_SECRET: ${{ secrets.TELEGRAM_OAUTH_CLIENT_SECRET }}
          TELEGRAM_OAUTH_REDIRECT_URI: ${{ secrets.TELEGRAM_OAUTH_REDIRECT_URI }}
